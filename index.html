<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet XP v2</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#f5f6fa}
.sidebar{width:260px;min-height:100vh;background:#1f2937;color:#fff}
.sidebar a{display:block;color:#d1d5db;padding:10px;border-radius:8px;text-decoration:none}
.sidebar a:hover{background:#374151;color:#fff}
.hidden{display:none}
</style>
</head>
<body>
<div id="login" class="container vh-100 d-flex justify-content-center align-items-center">
<div class="card shadow p-4" style="width:420px">
<h2 class="text-center mb-4">INTRANET XP V2</h2>
<input id="correo" class="form-control mb-3" placeholder="Correo">
<input id="clave" type="password" class="form-control mb-3" placeholder="Contraseña">
<button class="btn btn-primary w-100" onclick="login()">Iniciar sesión</button>
</div></div>
<div id="app" class="hidden">
<div class="d-flex">
<div class="sidebar p-3">
<h4>XP ASESORES</h4><hr>
<a href="#" onclick="dashboard()"><i class='bi bi-speedometer2'></i> Dashboard</a>
<a href="#" onclick="prospectos()"><i class='bi bi-people'></i> Prospectos</a>
<a href="#" onclick="politicas()"><i class='bi bi-journal-text'></i> Políticas</a>
<a href="#" onclick="inventario()"><i class='bi bi-box'></i> Inventario</a>
<a href="#" onclick="usuarios()"><i class='bi bi-person-gear'></i> Usuarios</a>
<hr><button class='btn btn-danger w-100' onclick='logout()'>Salir</button>
</div>
<div class='container-fluid p-4'><div id='contenido'></div></div>
</div></div>
<script>
function login(){localStorage.setItem('xp_user',document.getElementById('correo').value||'admin');document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');dashboard();}
function logout(){localStorage.removeItem('xp_user');location.reload();}
if(localStorage.getItem('xp_user')){document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');setTimeout(dashboard,10);}
function getData(k){return JSON.parse(localStorage.getItem(k)||'[]')}
function setData(k,v){localStorage.setItem(k,JSON.stringify(v))}
function dashboard(){contenido.innerHTML=`<h2>Dashboard</h2><div class='row'><div class='col-md-3'><div class='card'><div class='card-body'><h5>Prospectos</h5><h1>${getData('prospectos').length}</h1></div></div></div><div class='col-md-3'><div class='card'><div class='card-body'><h5>Políticas</h5><h1>${getData('politicas').length||3}</h1></div></div></div></div>`}
function prospectos(){let d=getData('prospectos');let rows=d.map(p=>`<tr><td>${p.rfc}</td><td>${p.empresa}</td><td>${p.promotor}</td></tr>`).join('');contenido.innerHTML=`<div class='d-flex justify-content-between'><h2>Prospectos</h2><button class='btn btn-primary' onclick='nuevoProspecto()'>Nuevo</button></div><table class='table mt-3'><tr><th>RFC</th><th>Empresa</th><th>Promotor</th></tr>${rows}</table>`}
function nuevoProspecto(){let rfc=prompt('RFC');if(!rfc)return;let empresa=prompt('Empresa');let promotor=prompt('Promotor');let d=getData('prospectos');d.push({rfc,empresa,promotor});setData('prospectos',d);prospectos();}
function politicas(){contenido.innerHTML=`<h2>Políticas Internas</h2><div class='row'><div class='col-md-4'><div class='card'><div class='card-header bg-primary text-white'>Código de Ética</div><div class='card-body'>Versión 1.0</div></div></div><div class='col-md-4'><div class='card'><div class='card-header bg-success text-white'>Vacaciones</div><div class='card-body'>Versión 1.2</div></div></div><div class='col-md-4'><div class='card'><div class='card-header bg-warning'>Seguridad</div><div class='card-body'>Versión 2.0</div></div></div></div>`}
function inventario(){contenido.innerHTML=`<h2>Inventario</h2><p>Módulo base listo para crecer.</p>`}
function usuarios(){contenido.innerHTML=`<h2>Usuarios</h2><table class='table'><tr><th>Usuario</th><th>Rol</th></tr><tr><td>Administrador</td><td>Admin</td></tr></table>`}
</script>
</body></html>
